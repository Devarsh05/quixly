# Local dev infrastructure for the agent service.
# Postgres (pgvector-enabled) + Redis. No secrets here — local-dev creds only,
# matching agent/.env.example. Do not use these credentials in production.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: quixly
      POSTGRES_PASSWORD: quixly
      POSTGRES_DB: quixly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quixly -d quixly"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
